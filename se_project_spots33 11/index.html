<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Spots: A social platform for sharing and discovering new places.">
  <meta name="author" content="Your Name">
  <meta name="keywords" content="spots, social, travel, sharing, places, posts, profile">
  <title>Spots</title>
</head>
<body class="page">
  <div class="page__content">
    <header class="header">
      <img src="./images/Logo.svg" alt="Spot logo" class="header__logo">
    </header>
    <main class="content">
      <section class="profile page__section">
  <img src="./images/avatar.jpg" class="profile__avatar" alt="User avatar">
  <div class="profile__column">
    <h1 class="profile__name">Bessie Coleman</h1>
    <p class="profile__description">Civil Aviator</p>
    <button type="button" class="profile__edit-btn">
      <img src="./images/edit-icon.png" alt="Pencil">Edit Profile
    </button>
  </div>
  <button type="button" class="profile__add-btn">
    <img src="./images/plus-icon.png" alt="Plus icon">New Post
  </button>
  </section>
  <section class="cards page__section">
      <ul class="cards__list">
      </ul>
      <template id="card-template">
        <li class="card">
          <div class="card__image-wrap">
            <img class="card__image" alt="">
            <button type="button" class="card__delete-button" aria-label="Delete"></button>
          </div>
            <div class="card__footer">
            <h2 class="card__title"></h2>
            <div class="card__actions">
              <button type="button" class="card__like-button" aria-label="Like">
                <svg class="card__like-icon" width="20" height="20" viewBox="0 0 23 20" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                  <path class="card__like-icon-path" d="M15.9512 1.05664C17.407 0.843258 19.0058 1.20243 20.4287 2.57324C22.7316 4.79188 22.3044 8.23936 20.4248 10.0693L11.5 18.6025L2.57422 10.0693H2.5752C0.695636 8.23936 0.268448 4.79188 2.57129 2.57324C3.99417 1.20243 5.593 0.843258 7.04883 1.05664C8.5402 1.27524 9.89546 2.09997 10.7266 3.11523L11.5 4.06055L12.2734 3.11523C13.1045 2.09997 14.4598 1.27524 15.9512 1.05664Z" stroke="currentColor" stroke-width="2" fill="none" />
                </svg>
              </button>
            </div>
          </div>
        </li>
      </template>
    </section>
    </main>
    <footer class="footer">
      <p class="footer__copyright">2025 &copy; Spots</p>
    </footer>
    <div class="modal" id="edit-profile-modal">
      <div class="modal__container">
  <button class="modal__close" aria-label="Close"></button>
        <h2 class="modal__title">Edit profile</h2>
        <form class="modal__form" action="#" method="post" novalidate>
          <div class="modal__field">
            <label class="modal__label" for="profile-name">Name</label>
            <input id="profile-name" class="modal__input" name="name" type="text" placeholder="Type your name" required minlength="2" maxlength="40">
            <span id="profile-name-error" class="modal__error"></span>
          </div>
          <div class="modal__field">
            <label class="modal__label" for="profile-description">Description</label>
            <textarea id="profile-description" class="modal__textarea" name="Description" placeholder="Describe yourself" required minlength="2" maxlength="200"></textarea>
            <span id="profile-description-error" class="modal__error"></span>
          </div>
          <div class="modal__actions">
            <button type="submit" class="modal__save-btn">Save</button>
          </div>
        </form>
      </div>
    </div>
    <div class="modal modal_type_preview" id="image-preview-modal">
    <div class="modal__container modal__container--preview">
  <button class="modal__close" aria-label="Close"></button>
  <img class="modal__image" src="#" alt="" />
        <h3 class="modal__caption"></h3>
      </div>
    </div>

    <div class="modal" id="new-post-modal">
      <div class="modal__container">
  <button class="modal__close" aria-label="Close"></button>
        <h2 class="modal__title">New post</h2>
        <form class="modal__form" action="#" method="post" novalidate>
          <div class="modal__field">
            <label class="modal__label" for="post-image">Image</label>
            <input id="post-image" class="modal__input" name="image" type="url" placeholder="Paste a link to picture" required>
            <span id="post-image-error" class="modal__error"></span>
          </div>
          <div class="modal__field">
            <label class="modal__label" for="post-title">Title</label>
            <input id="post-title" class="modal__input" name="title" type="text" placeholder="Title" required minlength="2" maxlength="30">
            <span id="post-title-error" class="modal__error"></span>
          </div>
          <div class="modal__actions">
            <button type="submit" class="modal__save-btn">Create</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
